<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Delete — TeamVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f8f8f6; color: #111; }
        .danger-card { background: #ffffff; border: 1px solid #fee2e2; border-radius: 20px; box-shadow: 0 10px 30px rgba(220, 38, 38, 0.05); }
        .btn-delete { background: #dc2626; color: white; transition: all 0.2s; }
        .btn-delete:hover { background: #b91c1c; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2); }
        .btn-cancel { background: #f3f4f6; color: #4b5563; transition: all 0.2s; }
        .btn-cancel:hover { background: #e5e7eb; color: #111; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="danger-card w-full max-w-md p-8 text-center">
        <div class="w-20 h-20 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-2">Are you sure?</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            You are about to delete the credentials for <span class="font-bold text-gray-900">"{{ item.service_name }}"</span>.
            This action cannot be undone and the data will be permanently removed from the vault.
        </p>

        <form method="POST" class="space-y-3">
            {% csrf_token %}

            <button type="submit" class="btn-delete w-full py-4 rounded-xl font-bold text-sm tracking-wide uppercase">
                Yes, Delete Permanently
            </button>

            <a href="{% url 'vault:vault' %}" class="btn-cancel w-full block py-4 rounded-xl font-bold text-sm tracking-wide uppercase">
                No, Keep It
            </a>
        </form>

        <div class="mt-8 flex items-center justify-center gap-2 text-gray-400">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <span class="text-[10px] uppercase tracking-widest font-medium">Safe Deletion Protocol</span>
        </div>
    </div>

</body>
</html>
