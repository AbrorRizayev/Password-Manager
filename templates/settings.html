<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Settings — TeamVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        /* Asosiy stillar (Dashboard bilan bir xil) */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#f8f8f6;color:#111}
        :root{
            --sidebar:#0f172a;--border:#e8e6e0;--accent:#1a56db;
        }
        .sidebar{width:240px;min-height:100vh;background:var(--sidebar);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
        .sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07);}
        .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,0.55);font-size:13.5px;text-decoration:none;margin:2px 10px;}
        .nav-item:hover{background:rgba(255,255,255,0.07);color:#fff;}
        .nav-item.active{background:var(--accent);color:#fff;}

        .main{flex:1;min-width:0;display:flex;flex-direction:column;}
        .topbar{background:#fff;border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;}
        .settings-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px;max-width:600px;margin-top:20px;}

        input{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:#f9f9f7;outline:none;transition:border 0.2s;}
        input:focus{border-color:var(--accent);}
        .btn-save{background:var(--accent);color:#fff;padding:12px;border-radius:10px;font-weight:600;width:100%;margin-top:10px;cursor:pointer;border:none;}
    </style>
</head>
<body>
<div style="display:flex;">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:32px;height:32px;background:#1a56db;border-radius:8px;display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><path d="M12 2L3 7v5c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V7L12 2z"/></svg>
        </div>
        <span style="color:#fff;font-weight:600;">TeamVault</span>
      </div>
    </div>

    <nav style="padding-top:16px;">
      <a href="{% url 'vault:vault' %}" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:8px;"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        All items
      </a>

      <a href="{% url 'vault:settings' %}" class="nav-item active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:8px;"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <h1 style="font-size:18px; font-weight:600;">Account Settings</h1>
    </header>

    <div style="padding:40px;">

      {% if messages %}
        {% for message in messages %}
          <div style="padding:15px; border-radius:10px; margin-bottom:20px; font-size:14px; {% if message.tags == 'success' %}background:#dcfce7; color:#166534;{% else %}background:#fee2e2; color:#991b1b;{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <div class="settings-card">
        <h2 style="font-size:16px; font-weight:600; margin-bottom:20px; display:flex; align-items:center; gap:8px;">
            <svg width="18" height="18" fill="none" stroke="#1a56db" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            Master Password Security
        </h2>

        <form method="POST">
          {% csrf_token %}
          <div style="display:grid; gap:20px;">

            <div>
              <label style="display:block; font-size:11px; font-weight:700; color:#888; text-transform:uppercase; margin-bottom:6px;">Current Master Password</label>
              <input type="password" name="old_password" placeholder="••••••••" required>
            </div>

            <div style="height:1px; background:#eee; margin:5px 0;"></div>

            <div>
              <label style="display:block; font-size:11px; font-weight:700; color:#888; text-transform:uppercase; margin-bottom:6px;">New Master Password</label>
              <input type="password" name="new_password" placeholder="Min. 8 characters" required>
            </div>

            <div>
              <label style="display:block; font-size:11px; font-weight:700; color:#888; text-transform:uppercase; margin-bottom:6px;">Confirm New Password</label>
              <input type="password" name="confirm_password" placeholder="Repeat new password" required>
            </div>

            <button type="submit" class="btn-save">Update Master Password</button>
          </div>
        </form>
      </div>

      <div style="margin-top:30px; border:1px solid #fee2e2; background:#fef2f2; border-radius:16px; padding:20px; max-width:600px;">
        <h3 style="color:#991b1b; font-size:14px; font-weight:600; margin-bottom:5px;">Danger Zone</h3>
        <p style="color:#b91c1c; font-size:12px; margin-bottom:15px;">Hisobni o'chirish barcha saqlangan parollarni butunlay yo'q qiladi.</p>
        <button style="background:#fff; color:#dc2626; border:1px solid #fca5a5; padding:8px 16px; border-radius:8px; font-size
