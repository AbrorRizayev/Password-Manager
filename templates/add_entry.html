<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Entry — TeamVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f8f8f6; color: #111; }
        .form-card { background: #ffffff; border: 1px solid #e8e6e0; border-radius: 20px; box-shadow: 0 4px 25px rgba(0,0,0,0.03); }
        .input-field {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e8e6e0;
            background: #f9f9f7; outline: none; transition: all 0.2s; font-size: 14px;
        }
        .input-field:focus { border-color: #1a56db; background: #fff; box-shadow: 0 0 0 4px rgba(26,86,219,0.1); }
        .label-text { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-lg mb-6 text-left">
        <a href="{% url 'vault:vault' %}" class="text-sm text-gray-400 hover:text-blue-600 transition flex items-center gap-2">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Vault
        </a>
    </div>

    <div class="form-card w-full max-w-lg p-8 md:p-10">
        <div class="mb-10 text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">New Credential</h1>
            <p class="text-sm text-gray-500 mt-1">Add a new secure entry to your team vault.</p>
        </div>

        <form method="POST" action="{% url 'vault:add_entry' %}" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="label-text">Service Name</label>
                <input type="text" name="service_name" required placeholder="e.g. GitHub, AWS, Netflix" class="input-field">
            </div>

            <div>
                <label class="label-text">Website URL (Optional)</label>
                <input type="url" name="url" placeholder="https://github.com" class="input-field">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="label-text">Username</label>
                    <input type="text" name="username" required placeholder="admin_user" class="input-field">
                </div>
                <div>
                    <label class="label-text">Category</label>
                    <select name="category" class="input-field">
                        <option value="personal">Personal</option>
                        <option value="work">Work</option>
                        <option value="finance">Finance</option>
                        <option value="social">Social</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="label-text">Password</label>
                <div class="relative">
                    <input type="password" id="password-input" name="password" required placeholder="Enter secure password" class="input-field pr-12">
                    <button type="button" onclick="generatePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-blue-600 hover:text-blue-800 p-1">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                </div>

                <div class="mt-2 h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div id="strength-bar" class="h-full w-0 transition-all duration-300"></div>
                </div>
                <div class="flex justify-between mt-1">
                    <p id="strength-text" class="text-[10px] font-bold uppercase text-gray-400">Security: None</p>
                    <p id="duplicate-warning" class="text-[10px] font-bold uppercase text-red-500 hidden">⚠️ Already used in vault!</p>
                </div>
            </div>

            <div class="pt-4 flex flex-col gap-3">
                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3.5 rounded-xl transition shadow-lg shadow-blue-100 active:scale-[0.98]">
                    Save Credential
                </button>
                <a href="{% url 'vault:vault' %}" class="w-full text-center py-3.5 text-sm font-medium text-gray-500 hover:text-gray-700 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>

    <div class="mt-8 flex items-center gap-2 text-gray-400">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        <span class="text-[11px] uppercase tracking-widest font-medium">AES-256 Bit Encryption</span>
    </div>

   <script>
    const pwInput = document.getElementById('password-input');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');
    const duplicateWarning = document.getElementById('duplicate-warning');

    /**
     * 1. Bazadagi mavjud parollarni Django-dan JS-ga yuklaymiz.
     * Bu ro'yxat duplicate check uchun ishlatiladi.
     */
    const existingPasswords = [
        {% for h in existing_hashes %}
            "{{ h|escapejs }}",
        {% endfor %}
    ];

    /**
     * 2. Parol kuchini va takrorlanishini tekshirish funksiyasi
     */
    function checkStrength(value) {
        if (!value) {
            strengthBar.style.width = '0%';
            strengthText.innerText = "Security: None";
            strengthText.style.color = '#888';
            duplicateWarning.classList.add('hidden');
            return;
        }

        // --- DUPLICATE CHECK ---
        // Agar yozilayotgan parol bazadagi birortasiga mos kelsa
        if (existingPasswords.includes(value)) {
            duplicateWarning.classList.remove('hidden');
        } else {
            duplicateWarning.classList.add('hidden');
        }

        // --- STRENGTH LOGIC ---
        let strength = 0;
        if (value.length >= 8) strength += 25;
        if (value.match(/[a-z]/) && value.match(/[A-Z]/)) strength += 25;
        if (value.match(/\d/)) strength += 25;
        if (value.match(/[^a-zA-Z\d]/)) strength += 25;

        strengthBar.style.width = strength + '%';

        if (strength <= 25) {
            strengthBar.style.backgroundColor = '#ef4444'; // Qizil
            strengthText.innerText = "Security: Weak";
            strengthText.style.color = '#ef4444';
        } else if (strength <= 50) {
            strengthBar.style.backgroundColor = '#f59e0b'; // Sariq
            strengthText.innerText = "Security: Fair";
            strengthText.style.color = '#f59e0b';
        } else if (strength <= 75) {
            strengthBar.style.backgroundColor = '#3b82f6'; // Moviy
            strengthText.innerText = "Security: Good";
            strengthText.style.color = '#3b82f6';
        } else {
            strengthBar.style.backgroundColor = '#10b981'; // Yashil
            strengthText.innerText = "Security: Strong";
            strengthText.style.color = '#10b981';
        }
    }

    /**
     * 3. Avtomatik parol generatsiya qilish
     */
    function generatePassword() {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
        let pass = "";
        // Professional daraja uchun 16 talik murakkab parol
        for (let i = 0; i < 16; i++) {
            pass += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        pwInput.value = pass;
        pwInput.type = "text"; // Foydalanuvchi ko'rishi uchun vaqtincha ochamiz

        // Generatsiya bo'lishi bilan darhol tekshiramiz
        checkStrength(pass);
    }

    /**
     * 4. Event Listeners
     */
    // Har bir harf yozilganda ishlaydi
    pwInput.addEventListener('input', (e) => {
        checkStrength(e.target.value);
    });

    // Sahifa yuklanganda (masalan, edit sahifasida) avtomatik tekshirish
    window.addEventListener('DOMContentLoaded', () => {
        if (pwInput.value) {
            checkStrength(pwInput.value);
        }
    });
</script>
</body>
</html>
