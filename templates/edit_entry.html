<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Credential — TeamVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f8f8f6; color: #111; }
        .form-card { background: #ffffff; border: 1px solid #e8e6e0; border-radius: 20px; box-shadow: 0 4px 25px rgba(0,0,0,0.03); }
        .input-field {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e8e6e0;
            background: #f9f9f7; outline: none; transition: all 0.2s; font-size: 14px;
        }
        .input-field:focus { border-color: #1a56db; background: #fff; box-shadow: 0 0 0 4px rgba(26,86,219,0.1); }
        .label-text { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        .badge-edit { background: #eff4ff; color: #1a56db; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-lg mb-6 text-left">
        <a href="{% url 'vault:vault' %}" class="text-sm text-gray-400 hover:text-blue-600 transition flex items-center gap-2">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Vault
        </a>
    </div>

    <div class="form-card w-full max-w-lg p-8 md:p-10">
        <div class="mb-10 flex items-center justify-between">
            <div class="text-left">
                <span class="badge-edit mb-2 inline-block">Editing Entry</span>
                <h1 class="text-2xl font-bold text-gray-900">{{ item.service_name }}</h1>
            </div>
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center font-bold text-xl">
                {{ item.service_name|first|upper }}
            </div>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="label-text">Service Name</label>
                <input type="text" name="service_name" value="{{ item.service_name }}" required class="input-field">
            </div>

            <div>
                <label class="label-text">Website URL</label>
                <input type="url" name="url" value="{{ item.url|default:'' }}" placeholder="https://..." class="input-field">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="label-text">Username</label>
                    <input type="text" name="username" value="{{ item.username }}" required class="input-field">
                </div>
                <div>
                    <label class="label-text">Category</label>
                    <select name="category" class="input-field">
                        <option value="personal" {% if item.category == 'personal' %}selected{% endif %}>Personal</option>
                        <option value="work" {% if item.category == 'work' %}selected{% endif %}>Work</option>
                        <option value="finance" {% if item.category == 'finance' %}selected{% endif %}>Finance</option>
                        <option value="social" {% if item.category == 'social' %}selected{% endif %}>Social</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="label-text">Master Password (Hidden for security)</label>
                <div class="relative">
                    <input type="password" id="password-input" name="password" value="{{ password }}" required class="input-field pr-12">
                    <button type="button" id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 p-1">
                        <svg id="eye-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="text-[10px] text-gray-400 mt-2 italic">* O'zgartirmasangiz, joriy parol saqlanib qoladi.</p>
            </div>

            <div class="pt-6 flex flex-col gap-3">
                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3.5 rounded-xl transition shadow-lg shadow-blue-100 active:scale-[0.98]">
                    Save Changes
                </button>
                <a href="{% url 'vault:vault' %}" class="w-full text-center py-3.5 text-sm font-medium text-gray-500 hover:text-gray-700 transition">
                    Cancel and Go Back
                </a>
            </div>
        </form>
    </div>

    <div class="mt-8 flex items-center gap-2 text-gray-400">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        <span class="text-[11px] uppercase tracking-widest font-medium">Re-Encryption enabled</span>
    </div>

    <script>
        // Parolni ko'rsatish/yashirish
        const toggleBtn = document.getElementById('toggle-pw');
        const pwInput = document.getElementById('password-input');

        toggleBtn.addEventListener('click', () => {
            const isPassword = pwInput.type === 'password';
            pwInput.type = isPassword ? 'text' : 'password';
        });
    </script>
</body>
</html>
